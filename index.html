<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <link rel="stylesheet" href="style.css">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    </head>
    <body>
        <main>
            <nav class="topbar" role="navigation" aria-label="Main navigation">
                <div class="brand">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" aria-hidden="true"><rect x="2" y="3" width="7" height="7" rx="2" fill="#7c5cff"/><rect x="15" y="3" width="7" height="7" rx="2" fill="#5b46ff"/><rect x="2" y="14" width="7" height="7" rx="2" fill="#5b46ff"/><rect x="15" y="14" width="7" height="7" rx="2" fill="#7c5cff"/></svg>
                    <span class="app-title">Kanban</span>
                </div>
                <div class="actions">
                    <button id="toggle-modal" class="btn primary">Add Task</button>
                </div>
            </nav>
            <section class="board">
                <div id="todo" class="task-column">
                    <div class="heading">
                        <div class="left">To do</div>
                        <div class="right">Count</div>
                    </div>
                    
                </div>
                <div 
                id="progress" class="task-column">
                    <div class="heading">
                        <div class="left">In Progress</div>
                        <div class="right">Count</div>
                    </div>
                </div>
                <div id="done" class="task-column">
                    <div class="heading">
                        <div class="left">Done</div>
                        <div class="right">Count</div>
                    </div>
                </div>
            </section>
        </main>

        <div class="modal add-new-task">
            <div class="bg"></div>
            <div class="center">
                <input
                    type="text"
                    id="task-title-input"
                    placeholder="Task Title" />
                <textarea 
                id="task-desc-input"
                placeholder="Task Description"></textarea>
                <div class="priority-picker">
                    <span>Priority</span>
                    <div class="priority-options">
                        <button type="button" class="priority-option" data-priority="Normal">Normal</button>
                        <button type="button" class="priority-option active" data-priority="Important">Important</button>
                        <button type="button" class="priority-option" data-priority="Urgent">Urgent</button>
                    </div>
                </div>
                <button id="add-new-task"
                    class="add-task-btn">Add Task</button>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
